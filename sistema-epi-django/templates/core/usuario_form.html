{% extends 'core/base.html' %}
{% block titulo %}Novo usuário{% endblock %}
{% block conteudo %}
<h1>Cadastro de usuário do sistema</h1>
<form method="post" class="painel" novalidate>
  {% csrf_token %}
  {% if form.non_field_errors %}<div class="erros-form">{{ form.non_field_errors }}</div>{% endif %}
  {% include 'core/_form_campos.html' %}
  <div class="acoes">
    <a class="btn btn-secundario" href="{% url 'usuario_lista' %}">Cancelar</a>
    <button class="btn btn-primario" type="submit">Salvar usuário</button>
  </div>
</form>
{% endblock %}
