{# Renderização padrão de campos de formulário com rótulo, erro e ajuda #}
<div class="grade">
  {% for campo in form.visible_fields %}
  <div class="grupo">
    <label for="{{ campo.id_for_label }}">{{ campo.label }}{% if campo.field.required %} <span class="obrigatorio">*</span>{% endif %}</label>
    {{ campo }}
    {% if campo.help_text %}<div class="ajuda">{{ campo.help_text }}</div>{% endif %}
    {% if campo.errors %}<ul class="erros">{% for e in campo.errors %}<li>{{ e }}</li>{% endfor %}</ul>{% endif %}
  </div>
  {% endfor %}
</div>
