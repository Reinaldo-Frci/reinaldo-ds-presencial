{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar · Gestão de EPIs</title>
<link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<div class="login-fundo">
  <div class="login-cartao">
    <div class="marca"><span class="capacete">EPI</span> Gestão de EPIs</div>
    {% if form.errors %}
      <div class="erros-form">Usuário ou senha inválidos. Verifique e tente novamente.</div>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="grupo" style="margin-bottom:12px;">
        <label for="id_username">Usuário</label>
        <input class="campo" type="text" name="username" id="id_username" autofocus required>
      </div>
      <div class="grupo" style="margin-bottom:18px;">
        <label for="id_password">Senha</label>
        <input class="campo" type="password" name="password" id="id_password" required>
      </div>
      <button class="btn btn-primario" style="width:100%;" type="submit">Entrar</button>
    </form>
  </div>
</div>
</body>
</html>
